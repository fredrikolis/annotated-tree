name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          token: ${{ secrets.GITHUB_TOKEN }}
      # Publish the curl|sh installer under the stable asset name the README's
      # one-liner points at (…/releases/latest/download/annotated-tree-installer.sh).
      - name: Upload installer script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp installer/install.sh annotated-tree-installer.sh
          gh release upload "${{ github.ref_name }}" annotated-tree-installer.sh --clobber

  upload-assets:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            build_tool: cargo-zigbuild
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            build_tool: cargo-zigbuild
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            build_tool: cargo-zigbuild
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Produces cargo-binstall-compatible archives (name-target.tar.gz + .sha256)
      # and uploads them to the release for this tag.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: annotated-tree
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build_tool || 'cargo' }}
          archive: $bin-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publishes the npm channel (`npx annotated-tree`) by REUSING the same binaries
  # built above for the GitHub Release — one artifact, many channels. Downloads
  # each release tarball, extracts its binary, stamps the version across the main
  # shim + per-platform packages, then publishes platform packages first and the
  # main package last, via OIDC trusted publishing — NO stored token. Requires each
  # package to already exist on npm with a configured trusted publisher (one-time
  # bootstrap; see RELEASING.md). Provenance is generated automatically.
  publish-npm:
    needs: upload-assets
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # REQUIRED: mint the short-lived OIDC token for trusted publishing
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # for `gh release download`
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24                       # bundles npm 11.x
          registry-url: https://registry.npmjs.org
      - name: Ensure npm >= 11.5.1 (OIDC trusted publishing)
        run: npm install -g npm@latest && npm --version
      - name: Download release binaries and extract per target
        run: |
          set -eux
          tag="${{ github.ref_name }}"
          targets="x86_64-unknown-linux-musl aarch64-unknown-linux-musl x86_64-apple-darwin aarch64-apple-darwin x86_64-pc-windows-msvc"
          for target in $targets; do
            mkdir -p "dist/${target}"
            # taiki-e packages Windows targets as .zip, every other target as .tar.gz.
            case "$target" in
              *windows*) ext=zip ;;
              *)         ext=tar.gz ;;
            esac
            archive="annotated-tree-${target}.${ext}"
            gh release download "$tag" -p "$archive" -O "$archive" --clobber
            if [ "$ext" = zip ]; then
              unzip -o "$archive" -d "dist/${target}"
            else
              tar -xzf "$archive" -C "dist/${target}"
            fi
          done
      - name: Stamp version + inject binaries
        run: |
          set -eux
          version="${GITHUB_REF_NAME#v}"
          node npm/scripts/build-npm.mjs "$version" dist
      # No NODE_AUTH_TOKEN: `npm publish` auto-detects the OIDC id-token. Unscoped
      # packages are public by default; provenance is emitted automatically.
      - name: Publish platform packages then main package (OIDC)
        run: |
          set -eux
          for plat in linux-x64-musl linux-arm64-musl darwin-x64 darwin-arm64 win32-x64; do
            npm publish "npm/platforms/${plat}"
          done
          npm publish npm

  # Requires a tap repo (fredrikolis/homebrew-tap) and a HOMEBREW_TAP_TOKEN
  # PAT with contents:write on it. Opens a formula-bump PR from the release assets.
  homebrew:
    needs: upload-assets
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Bump formula (only when a tap token is configured)
        if: ${{ env.TAP_TOKEN != '' }}
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: annotated-tree
          homebrew-tap: fredrikolis/homebrew-tap
          download-url: https://github.com/fredrikolis/annotated-tree/releases/download/${{ github.ref_name }}/annotated-tree-x86_64-apple-darwin.tar.gz
        env:
          COMMITTER_TOKEN: ${{ env.TAP_TOKEN }}
      - name: Skip note
        if: ${{ env.TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN not set; skipping Homebrew formula bump."
