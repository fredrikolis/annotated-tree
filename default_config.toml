# Built-in default configuration for annotated-tree.
# Precedence (low -> high): these defaults < ~/.config/annotated-tree/config.toml
# < ./.annotated-tree.toml (nearest ancestor) < command-line flags.
#
# The annotation format is INVARIANT — not configurable — so a cross-repo agent can
# trust the map's shape without reading each repo's config first. Every file's first
# eligible comment line carries three ` | `-delimited (space-pipe-space) keyed fields:
#   <comment> Concern: <what it does> | Non-concern: <what it deliberately isn't> | IO: <(in) -> out  OR  none>
# `Concern:` and `Non-concern:` are required and reject filler (none/n/a/nothing/…);
# `IO:` is required but `none` is a first-class blessed value (config, data, and docs
# use `IO: none`). This is enforced in code, not by a regex here — so the only per-language
# knob is the comment MARKER (below). The advertised `example` shown in `--help` and
# `--strict-check` is DERIVED from that marker plus the fixed format, never configured.

[limits]
# Runaway-scope safety valve. Aborts (exit 2, nothing written) once a root exceeds
# this many code files, before any model/graph/render work. Raise with --max-files
# <N>, disable with --no-limit, or set ANNOTATED_TREE_MAX_FILES. Peak memory scales
# with FILE COUNT (per file we read only a 64 KB annotation head + metadata().len(),
# never whole contents), so a file cap — not a byte cap — is the right guard here.
max_files = 10000

[rules]
# Architectural dependency rules, enforced by --strict-check alongside annotation
# linting. All optional; these defaults enforce nothing. Names are canonical
# package names (as shown in the dependency tree).
deny = []              # e.g. [["web", "core"]] forbids package `web` depending on `core`
forbid_cycles = false  # flag any dependency cycle among internal packages
forbid_orphans = false # flag internal packages with no dependency edge in or out
require_package_charter = false # fail a manifest-bearing package that has annotated files but resolves no concern charter (a .annotation breadcrumb, else its entry file's annotation)

[display]
show_age = false        # append file mtimes (non-deterministic); opt in with --age
show_tokens = false     # append a rough per-file/package token estimate; opt in with --tokens
show_symbols = false    # outline top-level definitions per file (needs a `symbols`-feature build); opt in with --symbols
ascii = false           # Unicode box-drawing by default; --ascii for restricted terminals
gitignore = true        # respect .gitignore by default; --no-gitignore to disable
include_tests = false   # "tests" directories are hidden unless --include-tests
max_per_node = 50       # cap entries shown per directory (subdirs and files each); overflow collapses to a "[+N folders and F files]" marker. Display-only (the walk still visits every file). Expand with --full or --max-per-node 0

# --- Languages -------------------------------------------------------------
# Each entry maps file extensions to how the first-line annotation is found.
# The extraction engine always: skips a shebang, skips blank lines, then reads
# the first comment using the tokens below. Set `pattern` to bypass the engine
# with a capture-group regex: the annotation is taken from the capture group named
# `annotation` if present, else capture group 1. The advertised exemplar is derived
# from each language's marker (the annotation FORMAT itself is fixed, not per-language).

[languages.python]
extensions = [".py"]
comment = "#"
docstring = ['"""', "'''"]

[languages.rust]
extensions = [".rs"]
comment = "//"

[languages.go]
extensions = [".go"]
comment = "//"

[languages.typescript]
extensions = [".ts", ".tsx", ".js", ".jsx"]
comment = "//"

[languages.vue]
extensions = [".vue", ".svelte"]
block = ["<!--", "-->"]

[languages.shell]
# Shell scripts must keep a `#!` shebang on line 1; the engine skips it and reads
# the annotation from the first comment below (typically line 2).
extensions = [".sh", ".bash"]
comment = "#"

[languages.sql]
extensions = [".sql"]
comment = "--"

[languages.markdown]
# One grammar for code AND prose: Markdown uses the SAME three fields, with `IO: none`
# where a doc has no callable contract (no per-language dialect / carve-out).
extensions = [".md"]
block = ["<!--", "-->"]
